name: CI/CD Pipeline

"on":
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # 允许手动触发

env:
  NODE_VERSION: '20.x'
  # 容器内静态文件目录（与官方 nginx 镜像默认目录一致）
  NGINX_HTML_DIR: '/usr/share/nginx/html'
  # Docker 容器/镜像相关命名（ECS 上容器会以该名称运行）
  APP_NAME: 'newsapp'

jobs:
  # 1. 代码测试
  test:
    name: 代码单元测试
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 安装依赖 
        run: npm ci
      
      - name: 安装 rolldown 原生绑定
        run: npm install @rolldown/binding-linux-x64-gnu --no-save || true
      
      - name: 运行单元测试
        run: npm run test
      
      - name: 构建前端项目（验证构建）
        run: npm run build

  # 2. 构建 nginx Docker 镜像并推送到 TCR
  # 依赖 Secrets（ECS）：ECS_HOST、ECS_USER、ECS_SSH_PRIVATE_KEY
  # 依赖 Secrets（TCR）：TCR_REGISTRY、TCR_NAMESPACE、TCR_REPOSITORY、TCR_USERNAME、TCR_PASSWORD
  build_and_push_image:
    name: 构建并推送镜像到 TCR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
 
      - name: 检查部署所需 Secrets
        run: |
          missing=""
          [ -z "${{ secrets.ECS_HOST }}" ] && missing="${missing} ECS_HOST"
          [ -z "${{ secrets.ECS_USER }}" ] && missing="${missing} ECS_USER"
          [ -z "${{ secrets.ECS_SSH_PRIVATE_KEY }}" ] && missing="${missing} ECS_SSH_PRIVATE_KEY"
          [ -z "${{ secrets.TCR_REGISTRY }}" ] && missing="${missing} TCR_REGISTRY"
          [ -z "${{ secrets.TCR_NAMESPACE }}" ] && missing="${missing} TCR_NAMESPACE"
          [ -z "${{ secrets.TCR_REPOSITORY }}" ] && missing="${missing} TCR_REPOSITORY"
          [ -z "${{ secrets.TCR_USERNAME }}" ] && missing="${missing} TCR_USERNAME"
          [ -z "${{ secrets.TCR_PASSWORD }}" ] && missing="${missing} TCR_PASSWORD"
          if [ -n "${missing}" ]; then
            echo "::error::以下 Secrets 未配置，无法连接 ECS：${missing}"
            echo "::error::请到 仓库 Settings → Secrets and variables → Actions 添加对应项。"
            echo "::error::ECS_SSH_PRIVATE_KEY 需为完整私钥内容（含 -----BEGIN ... ----- 与 -----END ... -----），勿含多余空格/换行。"
            exit 1
          fi
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}
          logout: true

      - name: 生成镜像标签
        id: meta
        run: |
          IMAGE="${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ secrets.TCR_REPOSITORY }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=latest" >> "$GITHUB_OUTPUT"

      - name: 构建并推送镜像（含 latest 与 commit sha）
        run: |
          docker build \
            --pull \
            --build-arg NODE_VERSION="${{ env.NODE_VERSION }}" \
            --build-arg NGINX_HTML_DIR="${{ env.NGINX_HTML_DIR }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_sha }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_latest }}" \
            .
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_latest }}"

      - name: 写出部署信息（供后续 job 使用）
        run: |
          echo "IMAGE=${{ steps.meta.outputs.image }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ steps.meta.outputs.tag_sha }}" >> $GITHUB_ENV

  # 3. 部署到 ECS
  deploy:
    name: 部署到 ECS   
    needs: build_and_push_image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ECS_SSH_PRIVATE_KEY }}" | tr -d '\r' | sed 's/[[:space:]]*$//' > ~/.ssh/id_rsa
          echo >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts 2>&1 || true

      - name: 在 ECS 上安装/配置 Docker，登录 TCR，拉取并启动 nginx 容器
        run: |
          IMAGE="${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ secrets.TCR_REPOSITORY }}"
          IMAGE_TAG="${GITHUB_SHA}"
          CONTAINER_NAME="${{ env.APP_NAME }}-nginx"

          ssh -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" \
            "IMAGE='$IMAGE' IMAGE_TAG='$IMAGE_TAG' CONTAINER_NAME='$CONTAINER_NAME' \
             TCR_REGISTRY='${{ secrets.TCR_REGISTRY }}' TCR_USERNAME='${{ secrets.TCR_USERNAME }}' TCR_PASSWORD='${{ secrets.TCR_PASSWORD }}' \
             bash -se" <<'REMOTE'
          set -e
          echo '1) 确保 Docker 已安装并启动...'
          if ! command -v docker >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y ca-certificates curl gnupg
              curl -fsSL https://get.docker.com | sh
            else
              echo '当前系统无法自动安装 Docker（缺少 apt-get）。请手动安装 Docker。'
              exit 1
            fi
          fi

          if command -v systemctl >/dev/null 2>&1; then
            systemctl enable docker || true
            systemctl restart docker || systemctl start docker
          else
            service docker restart || service docker start || true
          fi
          docker version

          echo '2) 如宿主机 nginx 占用 80，则停止（避免与容器端口冲突）...'
          if command -v systemctl >/dev/null 2>&1; then
            systemctl stop nginx 2>/dev/null || true
            systemctl disable nginx 2>/dev/null || true
          else
            service nginx stop 2>/dev/null || true
          fi

          echo '3) 登录 TCR（在 ECS 上执行 docker login）...'
          echo "$TCR_PASSWORD" | docker login "$TCR_REGISTRY" -u "$TCR_USERNAME" --password-stdin

          echo '4) 拉取新镜像...'
          docker pull "${IMAGE}:${IMAGE_TAG}"

          echo '5) 以滚动方式替换容器...'
          if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            docker rm -f "${CONTAINER_NAME}" || true
          fi

          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            -p 80:80 \
            "${IMAGE}:${IMAGE_TAG}"

          echo '6) 容器内 Nginx 配置自检...'
          docker exec "${CONTAINER_NAME}" nginx -t
          REMOTE

      - name: 健康检查 
        run: |
          echo "等待服务启动..."
          sleep 10

          echo "1) 先在 ECS 本机检查（127.0.0.1）"
          ssh -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "bash -se" <<'REMOTE'
          set -e
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 5 http://127.0.0.1/ >/dev/null; then
              echo "ECS 本机健康检查通过"
              exit 0
            fi
            echo "ECS 本机未就绪，等待 5s 重试（$i/6）..."
            sleep 5
          done
          echo "ECS 本机健康检查失败：请在 ECS 上检查容器日志（docker logs）与容器状态（docker ps）"
          exit 1
          REMOTE

          echo "2) 再从 GitHub Runner 检查公网可达性 http://${{ secrets.ECS_HOST }}/"
          for i in 1 2 3 4 5 6; do
            if curl -fsS \
              --connect-timeout 10 \
              --max-time 20 \
              --retry 0 \
              http://${{ secrets.ECS_HOST }}/ >/dev/null; then
              echo "公网健康检查通过"
              exit 0
            fi
            echo "公网检查超时/失败，等待 10s 重试（$i/6）..."
            sleep 10
          done
          echo "::error::公网健康检查失败：大概率是安全组/防火墙未放行 80，或 ECS_HOST 不可从公网访问。"
          exit 1
